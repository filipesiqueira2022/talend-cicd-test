name: Talend Deploy Simulation

on:
  push:
    branches:
      - main

jobs:

  deploy-homolog:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout código
        uses: actions/checkout@v4

      - name: Criar ambiente homolog
        run: mkdir homolog

      - name: Copiar artefato para homolog
        run: cp GerarDados_0.1.zip homolog/

      - name: Verificar deploy
        run: ls -R homolog
